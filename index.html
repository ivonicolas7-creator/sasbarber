function ClientForm({ T, clients, client, onSave }) {
  const _T = T || THEMES.gold;
  const inputStyle = { ...inputStyleBase, border: `1px solid ${_T.accent}33`, color: _T.text };
  const labelStyle = { ...labelStyleBase, color: _T.muted };
  const btnPrimary = { ...btnPrimaryBase, background: `linear-gradient(135deg,${_T.accent},${_T.accentAlt})`, color: _T.bg };
  const cardStyle = { ...cardBase, background: _T.card || "rgba(255,255,255,0.03)", border: `1px solid ${_T.accent}14` };
  const isEdit = !!client;
  const [name, setName] = useState(client?.name || "");
  const [phone, setPhone] = useState(client?.phone || "");
  const [instagram, setInstagram] = useState(client?.instagram || "");
  const [notes, setNotes] = useState(client?.notes || "");
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState("");
  const validate = () => {
    if (!name.trim()) return "Ingresá un nombre";
    if (!phone.trim()) return "Ingresá un teléfono";
    if (!isValidPhone(phone)) return "Teléfono inválido (mínimo 8 dígitos)";
    const phoneDigits = phone.replace(/\D/g, "");
    const duplicate = clients.some(c => {
      if (isEdit && c.id === client.id) return false;
      return c.phone.replace(/\D/g, "") === phoneDigits;
    });
    if (duplicate) return "Ya existe un cliente con ese teléfono";
    return "";
  };
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div><label style={labelStyle}>Nombre</label><input value={name} onChange={e => { setName(e.target.value); setErr(""); }} placeholder="Nombre completo" style={inputStyle} /></div>

      <div><label style={labelStyle}>Instagram (opcional)</label><input value={instagram} onChange={e => setInstagram(e.target.value)} placeholder="@usuario" style={inputStyle} /></div>
      <div><label style={labelStyle}>Notas (opcional)</label><textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="Ej: Siempre pide degradé bajo" rows={2} style={{ ...inputStyle, resize: "vertical" }} /></div>
      {err && <div style={errHint}>{err}</div>}
      <button className={`bh ${saving ? "btn-disabled" : ""}`} onClick={() => {
        const e = validate(); if (e) { setErr(e); return; }
        setSaving(true);
        onSave({ id: client?.id || uid(), name: name.trim(), phone: phone.trim(), instagram: instagram.trim(), notes: notes.trim() });
      }} style={{ ...btnPrimary, boxShadow: "0 4px 20px `${T.accent}4D`" }}>{isEdit ? "Guardar Cambios" : "Agregar Cliente"}</button>
    </div>
  );
}

          time: new Date().toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit" }),
        });
      }} style={{ ...btnPrimary, background: `linear-gradient(135deg,${_T.success},${_T.success}CC)`, boxShadow: `0 4px 20px ${_T.success}4D` }}>
        ⚡ Registrar Servicio
      </button>
    </div>
  );
}

function EditQuickServiceForm({ T, qs, onSave }) {
  const _T = T || THEMES.gold;
  const inputStyle = { ...inputStyleBase, border: `1px solid ${_T.accent}33`, color: _T.text };
  const labelStyle = { ...labelStyleBase, color: _T.muted };
  const btnPrimary = { ...btnPrimaryBase, background: `linear-gradient(135deg,${_T.accent},${_T.accentAlt})`, color: _T.bg };
  const [name, setName] = useState(qs?.name || "");
  const [price, setPrice] = useState(qs?.price || 0);
  const [saving, setSaving] = useState(false);
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div><label style={labelStyle}>Descripción</label><input value={name} onChange={e => setName(e.target.value)} style={inputStyle} /></div>
      <div><label style={labelStyle}>Importe ($)</label><input type="number" min="0" value={price} onChange={e => setPrice(Number(e.target.value))} style={inputStyle} /></div>
      <button className={`bh ${saving ? "btn-disabled" : ""}`} onClick={() => {
        if (!name.trim() || price <= 0) return;
        setSaving(true);
        onSave({ ...qs, name: name.trim(), price: Math.max(0, price) });
      }} style={{ ...btnPrimary, boxShadow: `0 4px 20px ${_T.accent}4D` }}>Guardar Cambios</button>
    </div>
  );
}


    // Mount
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(AuthWrapper));
  </script>
</body>
</html>
